openapi: 3.0.4
info:
  title: WiSP API
  description: |
    <h2>WiSP (Wireless Image Slideshow for Photoframes)</h2>

    Backend API for the WiSP e-Paper photo frame system.
    Serves processed images to ESP32 devices and provides catalog management endpoints for the admin SPA.

  version: "2025-03-01"

servers:
  - url: 'http://localhost:9002/'
    description: Local development

tags:
  - name: system
    description: Health and version information
  - name: catalogs
    description: Catalog and image management
  - name: device
    description: Image delivery endpoints for ESP32 devices

paths:

  /health:
    get:
      tags:
        - system
      summary: Liveness probe
      responses:
        '200':
          description: Server is running
          content:
            text/plain:
              schema:
                type: string
                example: OK

  /version:
    get:
      tags:
        - system
      summary: Build version and commit hash
      responses:
        '200':
          description: Version string
          content:
            text/plain:
              schema:
                type: string
                example: "v1.2.3 (abc1234) built 2025-03-01T00:00:00"

  /catalogs:
    get:
      tags:
        - catalogs
      summary: List all configured catalogs
      responses:
        '200':
          description: List of catalog keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  catalogs:
                    type: array
                    items:
                      type: string
                    example: ["photos", "dashboard"]
        '500':
          $ref: '#/components/responses/InternalError'

  /catalog/{catalogKey}/images:
    get:
      tags:
        - catalogs
      summary: Stream all images in a catalog
      description: |
        Returns a newline-delimited JSON (NDJSON) stream of images indexed in the catalog.
        Each line is a JSON object. The stream ends when all images have been sent.
      parameters:
        - $ref: '#/components/parameters/CatalogKey'
      responses:
        '200':
          description: NDJSON stream of images
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/ImageRecord'
        '500':
          $ref: '#/components/responses/InternalError'

  /catalog/{catalogKey}/image/{imgid}:
    get:
      tags:
        - catalogs
      summary: Get a thumbnail image by ID
      description: |
        Returns the thumbnail for the specified image. The file format is determined by the
        extension of `imgid` (`.jpg` or `.png`). If the image is not found or has no thumbnail,
        a placeholder image is returned with HTTP 404.
      parameters:
        - $ref: '#/components/parameters/CatalogKey'
        - in: path
          name: imgid
          required: true
          description: Image ID with extension, e.g. `42.jpg`
          schema:
            type: string
            example: "42.jpg"
      responses:
        '200':
          description: Image data
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '404':
          description: Image not found — placeholder image is returned
          content:
            image/jpeg:
              schema:
                type: string
                format: binary

  /catalog/selected/_toggle-visibility:
    post:
      tags:
        - catalogs
      summary: Toggle visibility for a list of images
      description: |
        Toggles the enabled/disabled state of the specified images within the given catalog.
        Disabled images are excluded from random delivery to devices.
      parameters:
        - in: query
          name: catalogKey
          required: true
          description: Catalog key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                  example: [1, 5, 12]
      responses:
        '200':
          description: Visibility toggled successfully
        '500':
          $ref: '#/components/responses/InternalError'

  /pf/{displayKey}/image/{imgid}:
    get:
      tags:
        - device
      summary: Get a specific image for a device
      description: |
        Returns the image with the given ID, processed and encoded for the specified display.
        The file format is determined by the extension of `imgid`.
      parameters:
        - $ref: '#/components/parameters/DisplayKey'
        - in: path
          name: imgid
          required: true
          description: Image ID with extension, e.g. `42.jpg`
          schema:
            type: string
            example: "42.jpg"
      responses:
        '200':
          description: Processed image data
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '404':
          description: Image not found — placeholder image is returned

  /pf/{displayKey}/image/random.bin:
    get:
      tags:
        - device
      summary: Get a random image for a device (Waveshare binary)
      description: |
        Picks a random enabled image from the catalogs assigned to the display, applies the full
        image processing pipeline (EXIF rotation, crop, filters, color reduction, optional flip),
        and returns it in Waveshare e-Paper proprietary binary format.

        The `X-Sleep-Seconds` response header tells the ESP32 how many seconds to sleep before
        the next request.
      parameters:
        - $ref: '#/components/parameters/DisplayKey'
      responses:
        '200':
          description: Processed image in Waveshare binary format
          headers:
            X-Sleep-Seconds:
              description: Seconds the device should sleep before the next request
              schema:
                type: integer
                example: 300
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  /pf/{displayKey}/image/random.jpg:
    get:
      tags:
        - device
      summary: Get a random image for a device (JPEG)
      description: Same as `random.bin` but returns a JPEG instead of the vendor binary.
      parameters:
        - $ref: '#/components/parameters/DisplayKey'
      responses:
        '200':
          description: Processed image in JPEG format
          headers:
            X-Sleep-Seconds:
              description: Seconds the device should sleep before the next request
              schema:
                type: integer
                example: 300
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  /pf/{displayKey}/image/random.png:
    get:
      tags:
        - device
      summary: Get a random image for a device (PNG)
      description: Same as `random.bin` but returns a PNG instead of the vendor binary.
      parameters:
        - $ref: '#/components/parameters/DisplayKey'
      responses:
        '200':
          description: Processed image in PNG format
          headers:
            X-Sleep-Seconds:
              description: Seconds the device should sleep before the next request
              schema:
                type: integer
                example: 300
          content:
            image/png:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

components:

  parameters:
    CatalogKey:
      in: path
      name: catalogKey
      required: true
      description: Catalog identifier as defined in `service.yaml`
      schema:
        type: string
        example: photos

    DisplayKey:
      in: path
      name: displayKey
      required: true
      description: Display identifier — the ESP32 MAC address (e.g. `a1b2c3d4e5f6`) or `dev` for local testing
      schema:
        type: string
        example: dev

  schemas:
    ImageRecord:
      type: object
      description: A single image record in the NDJSON stream
      properties:
        id:
          type: integer
          description: Primary key of the image
          example: 42
        enabled:
          type: boolean
          description: Whether the image is visible (not soft-deleted)
          example: true
        timestamp:
          type: string
          description: EXIF shooting date in UTC (ISO 8601), or empty string if not available
          example: "2024-06-15T10:30:00Z"

    ErrorModel:
      type: object
      properties:
        error:
          type: object
          properties:
            description:
              type: string
              description: Human-readable error message
              example: "display not found"
            trace_id:
              type: string
              description: Request trace ID for log correlation
              example: "abc123def456"

  responses:
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModel'

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModel'
          example:
            error:
              description: "internal server error"
              trace_id: "abc123def456"
