services:
  api:
    build:
      context: ./api
      target: development
      args:
        LOCAL_DEV: "true"
    ports:
      - "9002:9002"
    environment:
      - TZ=Asia/Tokyo
      # ALLOWED_ORIGINS: comma-separated list of allowed origins (default: * = allow all).
      # Set this in production to restrict cross-origin access.
      # Example: ALLOWED_ORIGINS=https://your-frontend.example.com
      #- ALLOWED_ORIGINS=https://your-frontend.example.com
      # --- catalog scan memory tuning ---
      # HEIC (HEVC) decoding uses ~300-500 MB per image in the Go decoder.
      # Default concurrency is min(NumCPU, 4); lower this on memory-constrained hosts.
      # - WISP_SCAN_CONCURRENCY=2
      # GOMEMLIMIT tells Go's GC to run more aggressively before hitting the OS limit.
      # Set to ~80% of the container's memory limit (e.g. 6GiB for an 8 GB host).
      # - GOMEMLIMIT=6GiB
    volumes:
      - ./api:/app
      - api-data:/data
      - ${PHOTO_DIR:?Copy .env.example to .env and set PHOTO_DIR}:/mnt/wisp:ro
    healthcheck:
      test: curl -f http://localhost:9002/health
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 3s

  frontend:
    build:
      context: ./frontend
      target: builder
    ports:
      - "8080:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:9002
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  api-data:
