services:
  api:
    build:
      context: ./api
      target: development
      args:
        LOCAL_DEV: "true"
    ports:
      - "9002:9002"
    environment:
      - TZ=Asia/Tokyo
      - ALLOWED_ORIGINS=http://localhost:8080
    volumes:
      - ./api:/app
      - api-data:/data
      - ${PHOTO_DIR:?Copy .env.example to .env and set PHOTO_DIR}:/mnt/wisp:ro
    healthcheck:
      test: curl -f http://localhost:9002/health
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 3s

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "8080:80"
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://localhost:9002}
    depends_on:
      api:
        condition: service_healthy

volumes:
  api-data:
