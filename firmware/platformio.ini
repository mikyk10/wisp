; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_xiao_esp32s3_epd7in3e]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_deps = 
build_flags = -D EPD_WAVESHARE_EPD7IN3E
            -D BOOT_PIN=0        # BOOT button (GPIO0)
            -D EPD_PWR_PIN=2     # D1  (GPIO2)
            -D EPD_BUSY_PIN=3    # D2  (GPIO3)
            -D EPD_RST_PIN=4     # D3  (GPIO4)
            -D EPD_DC_PIN=5      # D4  (GPIO5)
            -D EPD_CS_PIN=6      # D5  (GPIO6)
            -D EPD_SCK_PIN=7     # D8  (SPI SCK)
            -D EPD_MOSI_PIN=9    # D10 (SPI MOSI)
            -D BUF_SIZE=1000
            -DCONFIG_SPIRAM_SUPPORT=1
            -DCONFIG_SPIRAM_USE_MALLOC=1

[env:seeed_xiao_esp32c3_epd4in0e]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_deps =
build_flags = -D EPD_WAVESHARE_EPD4IN0E
            -D BOOT_PIN=9        # BOOT button (GPIO9)
            -D EPD_PWR_PIN=3     # D1  (GPIO3)
            -D EPD_BUSY_PIN=4    # D2  (GPIO4)
            -D EPD_RST_PIN=5     # D3  (GPIO5)
            -D EPD_DC_PIN=6      # D4  (GPIO6)
            -D EPD_CS_PIN=7      # D5  (GPIO7)
            -D EPD_SCK_PIN=8     # D8  (SPI SCK)
            -D EPD_MOSI_PIN=10   # D10 (SPI MOSI)
            -D BUF_SIZE=1000
            -DCONFIG_SPIRAM_SUPPORT=1
            -DCONFIG_SPIRAM_USE_MALLOC=1

