<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 1600px; overflow: hidden; }
    body {
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
    }
    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 48px;
    }
    .title {
      font-size: 115px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 16px;
    }
    .subtitle {
      font-size: 32px;
      color: #6e7681;
      letter-spacing: 3px;
      margin-top: -28px;
    }
    .setup-box {
      border: 2px solid #21262d;
      border-radius: 16px;
      padding: 44px 64px;
      background: #161b22;
      width: 750px;
    }
    .setup-label {
      font-size: 26px;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 24px;
    }
    .setup-text {
      font-size: 44px;
      color: #e6edf3;
      line-height: 1.7;
    }
    .key {
      display: inline-block;
      background: #21262d;
      border: 2px solid #30363d;
      border-bottom: 4px solid #30363d;
      border-radius: 8px;
      padding: 2px 18px;
      font-size: 40px;
      font-family: 'SF Mono', 'Menlo', monospace;
      color: #3ee8c0;
    }
    img {
      filter: brightness(1.8) contrast(0.8);
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <img src="logo.svg" width="280" height="280">
    <div class="title">WiSP</div>
    <div class="subtitle">DIY e-Paper Photo Frame</div>
    <div class="setup-box">
      <div class="setup-label">Setup</div>
      <div class="setup-text">
        Press <span class="key">RST</span>, then immediately hold <span class="key">BOOT</span><br>
        to enter Wi-Fi setup mode
      </div>
    </div>
  </div>
</body>
</html>
