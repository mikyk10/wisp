server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers ─────────────────────────────────────────────────────
  # Prevent clickjacking
  add_header X-Frame-Options "DENY" always;
  # Prevent MIME-type sniffing
  add_header X-Content-Type-Options "nosniff" always;
  # Control referrer information sent with requests
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # Disable unnecessary browser features
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Content Security Policy (enforcing)
  # Adjust connect-src to include your API base URL if different from 'self'.
  add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline';
    font-src 'self' data:;
    img-src 'self' data: https://picsum.photos IMG_SRC_PLACEHOLDER;
    connect-src 'self' CONNECT_SRC_PLACEHOLDER;
    frame-ancestors 'none';
  " always;

  # ── SPA routing ──────────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── Cache control ────────────────────────────────────────────────────────
  # Hashed assets (JS/CSS bundles) are immutable; cache aggressively
  location ~* \.(js|css|woff2?|png|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # env.js must never be cached — it is regenerated on each container start
  location = /env.js {
    expires off;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # ── Health check endpoint ─────────────────────────────────────────────────
  location = /health {
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # ── Block dotfile access ──────────────────────────────────────────────────
  location ~ /\. {
    deny all;
  }
}
